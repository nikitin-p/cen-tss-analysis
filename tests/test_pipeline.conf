#!/usr/bin/env bash
# shellcheck shell=bash
#
# Test configuration for run_pipeline.sh integration tests.
# Uses test BED files from tests/data/ and a fake bowtie2 index.
# Source this file; do not execute it directly.

_CONF_DIR="$(cd -- "$(dirname -- "${BASH_SOURCE[0]}")" && pwd)"
_REPO_DIR="$(cd -- "$_CONF_DIR/.." && pwd)"

CENTROMERE_BED="$_CONF_DIR/data/centromere.bed"
TRANSPOSON_BED="$_CONF_DIR/data/transposon.bed"

# Fake index: a zero-byte .1.bt2 file created by make_test_data.py.
# The bowtie2 stub ignores the index, so any valid path is sufficient.
BOWTIE2_INDEX_PREFIX="$_CONF_DIR/data/fake_index/ref"

# Use minimal bowtie2 args; stubs ignore them anyway.
BOWTIE2_EXTRA_ARGS=(--local)

PYSELECTAL_ARGS=(-n 1 -m 1 -x G)
PYSELECTAL_PY="$_REPO_DIR/scripts/pyselectal.py"

MIN_MATCH_FRAC="0.90"
THREADS=1
