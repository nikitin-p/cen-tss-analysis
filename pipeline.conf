#!/usr/bin/env bash
# shellcheck shell=bash
#
# Configuration for cen-tss-analysis pipeline.
# Source this file; do not execute it directly.
# All paths must be absolute or relative to the directory where you run
# run_pipeline.sh. Set each value before running the pipeline.

# ── Annotation files ──────────────────────────────────────────────────────────

# BED file of centromeric regions (HOR/alpha-satellite).
# Used to extract reads from the input STAR BAM that map to these regions.
CENTROMERE_BED="/path/to/censat_hor_with_strand_R.bed"

# BED file of centromeric transposable elements.
# Alignments overlapping these regions are removed in step 5.
TRANSPOSON_BED="/path/to/adjusted_centromeric_transposons_full_ranges.bed"

# ── Bowtie2 index ─────────────────────────────────────────────────────────────

# Prefix of the bowtie2 index for the centromeric reference.
# Example: if your index files are /data/ref/cen_ref.1.bt2, set this to /data/ref/cen_ref
BOWTIE2_INDEX_PREFIX="/path/to/t2t_hor_with_strand_centromeres_ref"

# ── Tool options ──────────────────────────────────────────────────────────────

# Bowtie2 alignment arguments. Stored as a bash array so multi-word values
# are passed correctly. -k 800 retains up to 800 multimapping alignments,
# which is intentional for repetitive centromeric sequences.
BOWTIE2_EXTRA_ARGS=(-k 800 -D 1600 -R 1 --local)

# pyselectal.py arguments for 5'-G selection. Stored as a bash array.
# -n 1 -m 1 -x G: keep alignments with exactly one 5'-soft-clipped base
# that is G on the forward strand (C on the reverse strand).
PYSELECTAL_ARGS=(-n 1 -m 1 -x G)

# Path to pyselectal.py. The default resolves relative to this config file.
PYSELECTAL_PY="$(cd -- "$(dirname -- "${BASH_SOURCE[0]}")" && pwd)/scripts/pyselectal.py"

# XM mismatch filter threshold.
# Reads are kept when: (XM tag value) / (read length) < (1 - MIN_MATCH_FRAC).
# 0.90 means keep reads with fewer than 10% mismatches.
MIN_MATCH_FRAC="0.90"

# ── Resources ─────────────────────────────────────────────────────────────────

# Default thread count for all steps. Override at runtime with -t.
THREADS=20
